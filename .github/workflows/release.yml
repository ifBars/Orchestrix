name: Release Desktop App

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            args: --target x86_64-pc-windows-msvc --config tauri.release.conf.json
          - platform: macos-latest
            target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin --config tauri.release.conf.json
          - platform: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            args: --target x86_64-unknown-linux-gnu --config tauri.release.conf.json

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies (Ubuntu)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Validate tag matches manifest versions
        run: bun run release:assert-tag ${{ github.ref_name }}

      - name: Build and publish signed release assets
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          NODE_OPTIONS: --max-old-space-size=6144
        with:
          projectPath: ./src-tauri
          args: ${{ matrix.args }}
          tagName: ${{ github.ref_name }}
          releaseName: Orchestrix v__VERSION__
          releaseBody: |
            Ready-to-install desktop bundles for Orchestrix.

            Installers are published directly in GitHub Releases, and stable builds receive in-app auto-updates through the signed updater feed.
          releaseDraft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generateReleaseNotes: true
          updaterJsonPreferNsis: true
          releaseAssetNamePattern: "[name]_[version]_[platform]_[arch][setup][ext]"
