name: Build Beta Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v0.1.0-beta.1)'
        required: false
        type: string
  push:
    branches:
      - main
      - develop
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - develop

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'windows-latest'
            target: 'x86_64-pc-windows-msvc'
            args: '--target x86_64-pc-windows-msvc'
            artifact_name: 'orchestrix-windows-x86_64'
            artifact_paths: |
              src-tauri/target/x86_64-pc-windows-msvc/release/*.exe
              src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
              src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
          - platform: 'macos-latest'
            target: 'x86_64-apple-darwin'
            args: '--target x86_64-apple-darwin'
            artifact_name: 'orchestrix-macos-x86_64'
            artifact_paths: |
              src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg
              src-tauri/target/x86_64-apple-darwin/release/bundle/macos/*.app
          - platform: 'macos-latest'
            target: 'aarch64-apple-darwin'
            args: '--target aarch64-apple-darwin'
            artifact_name: 'orchestrix-macos-aarch64'
            artifact_paths: |
              src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
              src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app
          - platform: 'ubuntu-latest'
            target: 'x86_64-unknown-linux-gnu'
            args: '--target x86_64-unknown-linux-gnu'
            artifact_name: 'orchestrix-linux-x86_64'
            artifact_paths: |
              src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage
              src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/deb/*.deb

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies (Ubuntu)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install dependencies (macOS)
        if: matrix.platform == 'macos-latest'
        run: |
          # git2 with vendored-openssl feature builds OpenSSL from source
          # This works for both native and cross-compilation targets
          # No need to install system OpenSSL when using vendored feature
          # Set environment variables to ensure all OpenSSL-dependent crates use vendored builds
          if [ "${{ matrix.target }}" == "x86_64-apple-darwin" ]; then
            echo "OPENSSL_STATIC=1" >> $GITHUB_ENV
            echo "OPENSSL_VENDORED=1" >> $GITHUB_ENV
          fi

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_OPTIONS: --max-old-space-size=6144
        with:
          projectPath: ./src-tauri
          args: ${{ matrix.args }}
          # Only create release via tauri-action if it's a tag push
          # Otherwise, we'll use the create-release job for tag releases
          releaseDraft: false

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_paths }}
          retention-days: 90

  create-release:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version || github.ref_name }}
          name: Orchestrix Beta ${{ github.event.inputs.version || github.ref_name }}
          body: |
            ## Orchestrix Beta Release

            ### Downloads

            **Windows:**
            - Installer: `orchestrix-windows-x86_64` artifact
            - Portable: Check the `.exe` files in the artifact

            **macOS:**
            - Intel: `orchestrix-macos-x86_64` artifact
            - Apple Silicon: `orchestrix-macos-aarch64` artifact

            **Linux:**
            - AppImage: `orchestrix-linux-x86_64` artifact
            - Debian package: `orchestrix-linux-x86_64` artifact

            ### Installation

            1. Download the appropriate artifact for your platform
            2. Extract the files
            3. Run the installer or executable

            **Note:** This is a beta release. Please report any issues you encounter.
          draft: true
          prerelease: true
          files: |
            artifacts/**/*
          token: ${{ secrets.GITHUB_TOKEN }}
